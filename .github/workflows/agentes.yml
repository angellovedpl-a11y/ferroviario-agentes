name: Agentes Ferroviário Investidor

on:
  schedule:
    - cron: '0 9 * * *'       # todo dia às 6h (BRT = UTC-3)
    - cron: '0 11 * * 1'      # toda segunda às 8h (BRT) — Angelloti + Redator
  workflow_dispatch:            # permite rodar manualmente

jobs:
  coletor:
    name: Agente Coletor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python agentes/coletor.py
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  angelloti:
    name: Agente Angelloti
    runs-on: ubuntu-latest
    needs: coletor
    if: github.event.schedule == '0 11 * * 1' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python agentes/angelloti.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
